version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./assets:/app/assets
      - ./output:/app/output

  celery-worker:
    build: ./backend
    command: celery -A app.workers.celery_app worker --loglevel=info --pool=solo
    env_file:
      - .env
    volumes:
      - ./assets:/app/assets
      - ./output:/app/output
    depends_on:
      - backend

  celery-beat:
    build: ./backend
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - backend

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - backend
